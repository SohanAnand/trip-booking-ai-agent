services:
  - type: web
    name: trip-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MOCK_LLM
        value: "false"
      - key: BACKEND
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: APPROVAL_SIGNING_KEY
        sync: false
      - key: APPROVAL_VERIFY_KEY
        sync: false
      - key: CORS_ORIGINS_RAW
        sync: false
